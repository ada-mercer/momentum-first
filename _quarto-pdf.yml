format:
  pdf:
    toc: true
    toc-depth: 1
    # documentclass: scrbook # KOMA-script book class, often provides better typography for books
    # number-sections: true
    # colorlinks: true       # Makes internal and external links colored rather than boxed
    # keep-tex: true         # Keeps the intermediate .tex file (highly useful for debugging LaTeX errors)
    # geometry:              # Easily adjust margins
    #   - top=30mm
    #   - left=20mm
    #   - right=20mm
    #   - bottom=30mm
    include-in-header:
      - styles/pdf/preamble.tex
      - styles/pdf/macros.tex
      - text: |
          % Reset chapter counter at each part
          \counterwithin*{chapter}{part}
          % Prefix the chapter number with the Part numeral (e.g., I.1, I.2, II.1)
          \renewcommand{\thechapter}{\Roman{part}.\arabic{chapter}}
          % Widen the invisible box in the TOC to fit the longer chapter numbers
          \RedeclareSectionCommand[tocnumwidth=3.5em]{chapter}
