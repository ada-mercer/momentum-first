format:
  pdf:
    filters:
      - filters/remove-empty-pdf-index.lua
    toc: true
    toc-depth: 1
    colorlinks: true
    linkcolor: black
    urlcolor: black
    citecolor: black
    toccolor: black
    # documentclass: scrbook # KOMA-script book class, often provides better typography for books
    # number-sections: true
    # keep-tex: true         # Keeps the intermediate .tex file (highly useful for debugging LaTeX errors)
    # geometry:              # Easily adjust margins
    #   - top=30mm
    #   - left=20mm
    #   - right=20mm
    #   - bottom=30mm
    include-in-header:
      - styles/pdf/preamble.tex
      - styles/pdf/macros.tex
      - text: |
          % Add leaders so page targets scan clearly in print/PDF.
          \RedeclareSectionCommand[toclinefill=\TOCLineLeaderFill]{chapter}
