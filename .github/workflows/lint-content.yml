name: Validate Repo

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up canonical Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Bootstrap environment
        run: bash tooling/ci/install-ubuntu.sh --ci

      - name: Verify baseline dependencies
        run: python3 tooling/scripts/check_dependencies.py --mode full

      - name: Run repository test suite
        run: .venv/bin/python -m pytest tooling/tests

      - name: Check manuscript includes, assets, and explicit cross-references
        run: python3 tooling/scripts/check_crossrefs.py

      - name: Verify generated manuscript status is current
        run: |
          .venv/bin/python tooling/scripts/build_manuscript_status.py
          git diff --exit-code -- manuscript/backmatter/_manuscript-status-table.md
