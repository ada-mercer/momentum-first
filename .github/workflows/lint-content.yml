name: Validate Repo

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap environment
        run: bash ci/install-ubuntu.sh

      - name: Verify baseline dependencies
        run: python3 scripts/check_dependencies.py

      - name: Run dependency smoke test through pytest
        run: pytest tests/test_dependencies.py
