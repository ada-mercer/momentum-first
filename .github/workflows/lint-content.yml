name: Validate Repo

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap environment
        run: bash ci/install-ubuntu.sh --ci

      - name: Verify baseline dependencies
        run: python3 scripts/check_dependencies.py --mode full

      - name: Run dependency smoke test through pytest
        run: .venv/bin/python -m pytest tests/test_dependencies.py

      - name: Check manuscript includes, assets, and explicit cross-references
        run: python3 scripts/check_crossrefs.py
