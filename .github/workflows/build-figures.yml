name: Build Figures

on:
  workflow_dispatch:

jobs:
  build-figures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap environment
        run: bash ci/install-ubuntu.sh

      - name: Verify baseline dependencies
        run: python3 scripts/check_dependencies.py

      - name: Build registered figures
        run: python3 scripts/build_figures.py
