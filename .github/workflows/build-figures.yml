name: Build Figures

on:
  workflow_dispatch:

jobs:
  build-figures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap environment
        run: bash tooling/ci/install-ubuntu.sh --ci

      - name: Verify baseline dependencies
        run: python3 tooling/scripts/check_dependencies.py --mode figures

      - name: Build registered figures
        run: python3 tooling/scripts/build_figures.py

      - name: Verify canonical figure outputs are current
        run: git diff --exit-code -- figures/build
