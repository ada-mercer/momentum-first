name: Release Book

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap environment
        run: bash ci/install-ubuntu.sh

      - name: Verify baseline dependencies
        run: python3 scripts/check_dependencies.py

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match VERSION=$VERSION" >&2
            exit 1
          fi

      - name: Render PDF
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          quarto render --to pdf

      - name: Prepare PDF release artifact
        run: |
          set -euo pipefail
          PDF_PATH="$(find _book -type f -name '*.pdf' | sort | head -n 1 || true)"
          if [ -z "$PDF_PATH" ]; then
            echo "No PDF was produced under _book/" >&2
            exit 1
          fi

          cp "$PDF_PATH" Momentum-First.pdf
          test -s Momentum-First.pdf

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: Momentum-First.pdf
