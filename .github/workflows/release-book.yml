name: Release Book

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap environment
        run: bash ci/install-ubuntu.sh

      - name: Verify baseline dependencies
        run: python3 scripts/check_dependencies.py

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match VERSION=$VERSION" >&2
            exit 1
          fi

      - name: Render HTML and PDF
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          quarto render

      - name: Package HTML artifact
        run: |
          zip -r momentum-first-${GITHUB_REF_NAME}-html.zip _book

      - name: Locate PDF artifact
        run: |
          PDF_PATH="$(find . -maxdepth 3 -type f -name '*.pdf' ! -path './.git/*' | head -n 1 || true)"
          if [ -n "$PDF_PATH" ]; then
            echo "pdf_path=$PDF_PATH" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            momentum-first-${{ github.ref_name }}-html.zip
            ${{ env.pdf_path }}
