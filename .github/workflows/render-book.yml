name: Render Book Preview

on:
  workflow_dispatch:

jobs:
  render-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up canonical Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.3'

      - name: Bootstrap environment
        run: bash tooling/ci/install-ubuntu.sh --ci

      - name: Verify baseline dependencies
        run: python3 tooling/scripts/check_dependencies.py --mode full

      - name: Run release validation
        run: |
          .venv/bin/python -m pytest tooling/tests
          .venv/bin/python tooling/scripts/check_crossrefs.py
          .venv/bin/python tooling/scripts/build_manuscript_status.py
          git diff --exit-code -- manuscript/backmatter/_manuscript-status-table.md
          .venv/bin/python tooling/scripts/build_figures.py
          git diff --exit-code -- figures/build

      - name: Render PDF preview
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          quarto render --profile pdf

      - name: Prepare PDF preview artifact
        run: |
          set -euo pipefail
          PDF_PATH="$(find _book -type f -name '*.pdf' | sort | head -n 1 || true)"
          if [ -z "$PDF_PATH" ]; then
            echo "No PDF was produced under _book/" >&2
            exit 1
          fi

          cp "$PDF_PATH" Momentum-First.pdf
          test -s Momentum-First.pdf

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-First-preview-${{ github.sha }}
          path: Momentum-First.pdf
          if-no-files-found: error
