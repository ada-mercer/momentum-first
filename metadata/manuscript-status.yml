# Manuscript status ledger — CANONICAL SINGLE SOURCE OF TRUTH.
#
# The status table rendered in the book (backmatter/manuscript-status.qmd) is
# GENERATED from this file by scripts/build_manuscript_status.py. Do not edit the
# rendered table by hand; edit this file and re-render (the generator runs at
# pre-render, so a normal `quarto render` keeps them in sync).
#
# Field vocabulary:
#   maturity:     seed | working_draft | stabilizing | mature
#   verification: none | V1 | V2 | V3   (tiers defined in VERIFICATION_POLICY.md)
#
# Contribution/authorship facts are the same across the manuscript, so they live
# once here as defaults rather than being repeated per chapter. Authorship policy
# (author = Arne; AI-assisted contribution credited separately; contribution vs.
# verification distinct) is explained in the Preface, not duplicated here.

defaults:
  contributors:
    - Arne Klaveness
    - AI-assisted
  contribution_note: >
    Arne supplied the core framing and acceptance direction; AI-assisted
    contribution shaped drafting, structure, and review.

# Initial statuses are conservative placeholders: nothing is marked as formally
# verified until a review pass is recorded under VERIFICATION_POLICY.md. Bump
# maturity/verification here as chapters harden.
chapters:
  - id: introduction
    title: Introduction
    maturity: stabilizing
    verification: none
    note: Framing and motivation; conceptual, not load-bearing for later derivations.

  - id: foundations
    title: Foundations
    maturity: stabilizing
    verification: V3
    verified_by: author (human)
    note: Primitive variables, ADMC, and the invertible mappings — the load-bearing locks; verified by the author.

  - id: gravity
    title: Gravity and Structured Spacetime
    maturity: stabilizing
    verification: V2
    verified_by: author (human)
    note: Source-to-field-to-observer pipeline; structure and much of the content verified by the author, but several technical points remain unchecked (technical/V3 verification partial).

  - id: quantum
    title: Quantum Mechanics in Momentum Language
    maturity: working_draft
    verification: none
    note: Momentum-language reconstruction; correspondence-heavy, read provisionally.

  - id: expansion
    title: Space Expansion as Translation Yield
    maturity: working_draft
    verification: none
    note: The χ(t) translation-yield picture; a regime-bound cosmological mapping.

# Derivation appendices are tracked collectively for now. Promote an individual
# appendix to its own entry (same fields as a chapter) once its status diverges
# from the group.
appendices:
  title: Derivation appendices
  maturity: working_draft
  verification: none
  note: Formal derivation support for the chapters; individual entries added as statuses diverge.
