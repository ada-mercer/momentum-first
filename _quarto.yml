project:
  type: book
  output-dir: _book
  # render:
  #   - "*.qmd"
  #   - "!drafts/" # Useful for excluding specific files or folders from rendering

  # execute:
  #   freeze: auto     # Only re-render chunks when source code changes (great for large books)
  #   cache: true      # Cache heavy computations
  #   echo: false      # Hide code blocks by default (good for final reading copies)
  #   warning: false   # Suppress warnings in the final output

book:
  title: "Momentum First"
  # subtitle: "..."
  # date: last-modified # Automatically prints the date the book was last rendered
  # cover-image: images/cover.png # Adds a cover image for HTML and EPUB formats
  author:
  - "Arne Klaveness"
  - "Ada Mercer"
  # GitHub/GitLab integration (adds links to the sidebar)
  # repo-url: https://github.com/yourusername/momentum-first
  # repo-actions: [edit, issue, source]

  # HTML is now the opt-in secondary format.
  # Plain `quarto render` should primarily build the PDF book.
  downloads: [ pdf, epub ]

  # Adds social sharing buttons to HTML pages when HTML is rendered.
  sharing: [ twitter, facebook, linkedin ]

  chapters:
  - index.qmd
  - chapters/00-preface/index.qmd
  - part: "Introduction"
    chapters:
    - chapters/01-introduction/01-01-the-success-of-physics.qmd
    - chapters/01-introduction/01-02-open-questions-and-conceptual-pressure.qmd
    - chapters/01-introduction/01-03-the-momentum-first-wager.qmd
    - chapters/01-introduction/01-04-what-this-book-is-trying-to-do.qmd
  - part: "Foundations"
    chapters:
    - chapters/02-foundations/02-01-core-terms-and-variables.qmd
    - chapters/02-foundations/02-02-admc.qmd
    - chapters/02-foundations/02-03-invertible-mapping.qmd
    - chapters/02-foundations/02-04-space-and-momentum-stage-and-actor.qmd
    - chapters/02-foundations/02-05-time.qmd
    - chapters/02-foundations/02-06-kinematic-modifiers.qmd
    - chapters/02-foundations/02-07-what-foundations-establishes.qmd
  - part: "Gravity and Structured Spacetime"
    chapters:
    - chapters/03-gravity-and-structured-spacetime/03-01-gravity-in-m1.qmd
    - chapters/03-gravity-and-structured-spacetime/03-02-gravitational-sources.qmd
    - chapters/03-gravity-and-structured-spacetime/03-03-the-stationary-gravitational-field.qmd
    - chapters/03-gravity-and-structured-spacetime/03-04-local-gravity-and-observer-bookkeeping.qmd
    - chapters/03-gravity-and-structured-spacetime/03-05-nonstationary-gravity-extension-track.qmd
    - chapters/03-gravity-and-structured-spacetime/03-06-spacetime-lessons-and-open-boundaries.qmd
  - references.qmd
  # appendices:
  #   - chapters/appendix-a/index.qmd # Appendices automatically get lettered numbering (A, B, C...)

bibliography: bibliography.bib
# csl: styles/apa.csl # Specify a Citation Style Language file (e.g., APA, IEEE, Nature)

glossary: glossary.yml

crossref:
  chapters: true
  # fig-title: "Fig." # Customizes the prefix for figures (e.g., "Fig. 1.1")
  # tbl-title: "Table"

format:
  pdf:
    toc: true
    toc-depth: 1
    # documentclass: scrbook # KOMA-script book class, often provides better typography for books
    # number-sections: true
    # colorlinks: true       # Makes internal and external links colored rather than boxed
    # keep-tex: true         # Keeps the intermediate .tex file (highly useful for debugging LaTeX errors)
    # geometry:              # Easily adjust margins
    #   - top=30mm
    #   - left=20mm
    #   - right=20mm
    #   - bottom=30mm
    include-in-header:
    - styles/pdf/preamble.tex
    - styles/pdf/macros.tex
    - text: |
        % Reset chapter counter at each part
        \counterwithin*{chapter}{part}
        % Prefix the chapter number with the Part numeral (e.g., I.1, I.2, II.1)
        \renewcommand{\thechapter}{\Roman{part}.\arabic{chapter}}
        % Widen the invisible box in the TOC to fit the longer chapter numbers
        \RedeclareSectionCommand[tocnumwidth=3.5em]{chapter}
  # epub:                    # Standard format configuration if you want to publish to e-readers
  #   cover-image: images/cover.png
  #   chapter-level: 1       # Determines where page breaks occur in the e-reader
